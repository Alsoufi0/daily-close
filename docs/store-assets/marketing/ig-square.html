<!doctype html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1080px}
.sq{width:1080px;height:1080px;background:#0e3b34;color:#fff;font-family:Inter,sans-serif;padding:84px 80px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.sq::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 70% at 50% 0%,rgba(255,255,255,.06),transparent 55%)}
.top{display:flex;align-items:center;gap:16px;position:relative;z-index:1}
.top img{width:64px;height:64px;border-radius:16px}
.top .n{font-family:Fraunces,serif;font-weight:600;font-size:34px}
.eyebrow{margin-top:58px;font-size:23px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:#c2872b;position:relative;z-index:1}
.h{font-family:Fraunces,serif;font-weight:600;font-size:86px;line-height:1.02;margin-top:20px;letter-spacing:-.01em;position:relative;z-index:1}
.s{font-size:29px;font-weight:500;line-height:1.42;color:rgba(255,255,255,.78);margin-top:24px;max-width:840px;position:relative;z-index:1}
.offer{margin-top:auto;background:#c2872b;border-radius:24px;padding:32px 38px;position:relative;z-index:1}
.offer .b{font-family:Fraunces,serif;font-weight:600;font-size:36px;line-height:1.08}
.offer .sm{font-size:22px;font-weight:700;color:#fff;margin-top:8px}
.offer .sm .code{background:#fff;color:#0e3b34;border-radius:9px;padding:3px 12px;font-weight:900;letter-spacing:.03em;margin-left:4px}
.web{margin-top:22px;font-size:27px;font-weight:900;text-align:center;position:relative;z-index:1}
</style></head><body>
<div class="sq">
  <div class="top"><img src="../play/icon-512.png"><span class="n">Daily Close</span></div>
  <div class="eyebrow">For shop owners</div>
  <div class="h">Is your register<br/>short tonight?</div>
  <div class="s">See cash over/short for every store the moment your staff close out. Catch it the same night &mdash; not next month.</div>
  <div class="offer">
    <div class="b">Start free &mdash; no card.</div>
    <div class="sm">Then 50% off your first 3 months &middot; code <span class="code">STORE50</span></div>
  </div>
  <div class="web">dailyclose.us</div>
</div>
</body></html>
