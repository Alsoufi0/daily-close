services:
  - type: web
    name: daily-close-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ENABLE_SWAGGER
        value: "false"
      # ALLOW_DEMO_AUTH was removed. The API refuses to boot if it is set —
      # see apps/api/src/main.ts.
      # Production site is dailyclose.us (the code also hardcodes this domain
      # as a belt; keep the env in sync anyway). Include www + the legacy
      # Vercel URL so existing links keep working during the cutover.
      - key: ALLOWED_ORIGINS
        value: https://dailyclose.us,https://www.dailyclose.us,https://daily-close-mvp.vercel.app
      # Secrets — set these in the Render dashboard after first deploy
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_REPORTS_BUCKET
        value: pos-reports
      # Subscriptions / Stripe (set these to enable self-serve checkout)
      - key: STRIPE_SECRET_KEY
        sync: false # sk_live_... or sk_test_...
      - key: STRIPE_PRICE_ID
        sync: false # price_... for the $49.99/store/month plan
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PORTAL_URL
        sync: false # optional: customer portal link for self-serve cancel
      - key: STRIPE_CHECKOUT_URL
        sync: false # legacy fallback if you prefer a static link
      - key: SITE_URL
        value: https://dailyclose.us
      # Base URL embedded in the employee welcome SMS sign-in link. Without it
      # the link renders as "the Daily Close app/close" (broken).
      - key: APP_URL
        value: https://dailyclose.us
      # Twilio A2P 10DLC — REQUIRED for any SMS to actually send. Without these
      # SmsService.isConfigured() is false and every send is a silent no-op.
      # Set the secret values in the Render dashboard.
      - key: TWILIO_ACCOUNT_SID
        sync: false # AC...
      - key: TWILIO_AUTH_TOKEN
        sync: false # also verifies the inbound /sms/webhook signature
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false # MG... — preferred; handles STOP/HELP + sender pool
      - key: TWILIO_FROM_NUMBER
        sync: false # +1... — fallback only if no Messaging Service
      # OCR — Google Vision preferred when both keys are present
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: OCR_SPACE_API_KEY
        sync: false
      # Resend — weekly summary email
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Daily Close <reports@dailyclose.app>"
      # WhatsApp Business Cloud API
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TEMPLATE_LANGUAGE
        value: en_US
      - key: WHATSAPP_TEMPLATE_CLOSE_COMPLETED
        value: close_completed
      - key: WHATSAPP_TEMPLATE_MISSED
        value: missed_close
      - key: WHATSAPP_TEMPLATE_WEEKLY
        value: weekly_summary
      - key: WHATSAPP_TEMPLATE_MONTHLY
        value: monthly_summary
      # Shared secret for cron endpoints. REQUIRED in production — the
      # /notifications/* cron endpoints refuse when this is unset and
      # NODE_ENV=production.
      - key: CRON_SECRET
        sync: false
      # Sentry: REQUIRED in production — API refuses to boot if unset.
      - key: SENTRY_DSN
        sync: false
      # Optional dead-man heartbeats; cron pings these URLs on success.
      - key: HEALTHCHECKS_MISSED_CLOSE_PING_URL
        sync: false
      - key: HEALTHCHECKS_WEEKLY_SUMMARY_PING_URL
        sync: false
      - key: HEALTHCHECKS_MONTHLY_SUMMARY_PING_URL
        sync: false

  # Daily 23:45 sweep — creates missed-close alerts for stores that didn't submit
  - type: cron
    name: daily-close-missed-close-cron
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    schedule: "45 23 * * *"
    envVars:
      - key: CRON_API_URL
        sync: false # e.g. https://daily-close-api.onrender.com
      - key: CRON_SECRET
        sync: false # must match the API's CRON_SECRET
    dockerCommand: >
      sh -c "wget -q -O- --header=\"x-cron-secret: $CRON_SECRET\" --post-data='' $CRON_API_URL/notifications/check-missed-close && echo done"

  # Weekly summary — Monday 13:00 UTC (~ Monday morning across US/EU)
  - type: cron
    name: daily-close-weekly-summary-cron
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    schedule: "0 13 * * 1"
    envVars:
      - key: CRON_API_URL
        sync: false
      - key: CRON_SECRET
        sync: false
    dockerCommand: >
      sh -c "wget -q -O- --header=\"x-cron-secret: $CRON_SECRET\" --post-data='' $CRON_API_URL/notifications/weekly-summary && echo done"
