name: test

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

# Cancel superseded runs on the same ref so a fast follow-up push doesn't
# leave a stale run blocking merges.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        # Node 22+ ships a global WebSocket, which @supabase/supabase-js's
        # realtime client requires at createClient() time. On Node 20 the
        # Supabase-configured service tests throw "Node.js 20 detected without
        # native WebSocket support". Match the deployed runtime (Node 22).
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Prisma's generated client provides the strict types the API depends on.
      # Without this, `npm run typecheck` for apps/api fails with TS7006 noise
      # in repository / service files (parameters falling back to `any`).
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Typecheck (web + api + mobile)
        run: npm run typecheck

      - name: Test (API)
        run: npm test --workspace apps/api
